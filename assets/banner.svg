<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',system-ui,sans-serif">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0810"/>
      <stop offset="45%" stop-color="#1b1024"/>
      <stop offset="78%" stop-color="#341a30"/>
      <stop offset="100%" stop-color="#4a2440"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e9f0" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#e9b9cd" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#e9b9cd" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9aebd" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c9aebd" stop-opacity="0.16"/>
    </linearGradient>
    <clipPath id="r"><rect width="1200" height="320" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#r)">
    <rect width="1200" height="320" fill="url(#night)"/>

    <!-- stars -->
    <g fill="#f3e9ef">
      <circle cx="120" cy="54" r="1.2" opacity="0.7"/><circle cx="300" cy="40" r="1" opacity="0.5"/>
      <circle cx="470" cy="66" r="1.3" opacity="0.75"/><circle cx="640" cy="34" r="1" opacity="0.5"/>
      <circle cx="760" cy="60" r="1.1" opacity="0.6"/><circle cx="200" cy="96" r="1" opacity="0.45"/>
      <circle cx="540" cy="100" r="1" opacity="0.5"/><circle cx="1080" cy="48" r="1.2" opacity="0.6"/>
      <circle cx="1150" cy="90" r="1" opacity="0.45"/><circle cx="410" cy="120" r="1" opacity="0.4"/>
    </g>

    <!-- moon -->
    <circle cx="985" cy="96" r="120" fill="url(#moonGlow)"/>
    <circle cx="985" cy="96" r="46" fill="#f4e7ee"/>
    <circle cx="1004" cy="86" r="46" fill="#1b1024" opacity="0.85"/>  <!-- crescent shadow -->

    <!-- distant ridge -->
    <path d="M0 232 Q 200 188 420 224 T 820 216 T 1200 226 V320 H0 Z" fill="#120b18" opacity="0.75"/>

    <!-- mist bands -->
    <rect x="0" y="212" width="1200" height="52" fill="url(#mist)"/>
    <g fill="#d8c2ce" opacity="0.10">
      <rect x="60" y="238" width="520" height="10" rx="5"/>
      <rect x="520" y="256" width="620" height="12" rx="6"/>
      <rect x="740" y="228" width="360" height="8" rx="4"/>
    </g>

    <!-- pines (ink silhouette) -->
    <g fill="#0a0610">
      <g transform="translate(560,214)"><rect x="-3" y="30" width="6" height="34"/><path d="M0 -10 L22 26 H-22 Z"/><path d="M0 6 L28 40 H-28 Z"/></g>
      <g transform="translate(690,226) scale(0.78)"><rect x="-3" y="30" width="6" height="40"/><path d="M0 -10 L22 26 H-22 Z"/><path d="M0 6 L28 40 H-28 Z"/></g>
      <g transform="translate(80,224) scale(0.7)"><rect x="-3" y="30" width="6" height="46"/><path d="M0 -10 L22 26 H-22 Z"/><path d="M0 6 L28 40 H-28 Z"/></g>
    </g>

    <!-- minka house (ink silhouette, steep thatched roof) -->
    <g fill="#080510" transform="translate(1075,206)">
      <path d="M-70 34 L0 -20 L70 34 Z"/>            <!-- roof -->
      <path d="M-58 34 L0 -8 L58 34 Z" fill="#0f0916"/>
      <rect x="-44" y="34" width="88" height="42"/>  <!-- body -->
      <rect x="-14" y="48" width="28" height="28" fill="#2a1526"/>  <!-- lit doorway (faint warm) -->
    </g>

    <!-- torii — the single colour accent (beni) -->
    <g transform="translate(250,150)">
      <path d="M-84 6 q 84 -22 168 0 l -7 15 q -77 -18 -154 0 Z" fill="#e0455c"/>  <!-- kasagi -->
      <rect x="-70" y="30" width="140" height="12" rx="2" fill="#d13a52"/>          <!-- nuki -->
      <rect x="-52" y="6" width="15" height="118" rx="2" fill="#d9455f"/>           <!-- left pillar -->
      <rect x="37" y="6" width="15" height="118" rx="2" fill="#d9455f"/>            <!-- right pillar -->
      <rect x="-9" y="42" width="18" height="30" fill="#b83048"/>                   <!-- gakuzuka -->
    </g>

    <!-- foreground -->
    <rect x="0" y="286" width="1200" height="34" fill="#070409"/>

    <!-- title -->
    <text x="600" y="150" text-anchor="middle" font-size="56" font-weight="700" fill="#f4e7ee" letter-spacing="1.5">North-web-dev</text>
    <text x="600" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#f5a9c1" letter-spacing="6">&#21271;&#12288;K I T A&#12288;&#183;&#12288;N O R T H</text>
    <text x="600" y="210" text-anchor="middle" font-size="13.5" fill="#cbb2c0" letter-spacing="1.5" opacity="0.9">reverse engineering the wire &#183; byte-exact, or detectable</text>
  </g>
</svg>
