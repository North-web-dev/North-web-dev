<svg width="1200" height="120" viewBox="0 0 1200 120" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',system-ui,sans-serif">
  <defs>
    <linearGradient id="bghstats" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#130a16"/><stop offset="0.5" stop-color="#221232"/><stop offset="1" stop-color="#130a16"/>
    </linearGradient>
    <radialGradient id="glowhstats" cx="14%" cy="50%" r="34%">
      <stop offset="0" stop-color="#d9455f" stop-opacity="0.30"/><stop offset="100%" stop-color="#d9455f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="khstats" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#e0455c"/><stop offset="1" stop-color="#a5304a"/></linearGradient>
    <clipPath id="cphstats"><rect width="1200" height="120" rx="18"/></clipPath>
  </defs>
  <g clip-path="url(#cphstats)">
    <rect width="1200" height="120" fill="url(#bghstats)"/>
    <ellipse cx="170" cy="60" rx="360" ry="90" fill="url(#glowhstats)"><animate attributeName="opacity" values="0.7;1;0.7" dur="6s" repeatCount="indefinite"/></ellipse>
    <!-- huge faint kanji watermark right -->
    <text x="1120" y="112" text-anchor="end" font-size="150" font-weight="700" fill="#f5a9c1" opacity="0.05">記録</text>
    <!-- thin horizon line echoing the banner water -->
    <line x1="560" y1="92" x2="1160" y2="92" stroke="#5a3350" stroke-width="1" opacity="0.5"/>
    <g stroke="#e9c79a" stroke-width="1" opacity="0.3"><line x1="980" y1="104" x2="1120" y2="104"/></g>
    <!-- left beni accent edge -->
    <rect x="0" y="0" width="7" height="120" fill="#d9455f"/>
    <!-- kanji block -->
    <rect x="42" y="30" width="60" height="60" rx="14" fill="url(#khstats)" stroke="#e9c79a" stroke-opacity="0.5"/>
    <text x="72" y="72" text-anchor="middle" font-size="30" font-weight="700" fill="#fdeff3">記録</text>
    <!-- latin label + romaji -->
    <text x="128" y="62" font-size="40" font-weight="700" letter-spacing="6" fill="#f6ebf0">stats</text>
    <text x="130" y="90" font-size="14" font-weight="600" letter-spacing="4" fill="#f5a9c1" opacity="0.85">きろく · RECORD</text>
    <!-- gold dots + sakura petals accent (drifting) -->
    <g fill="#e6a23c"><circle cx="1150" cy="30" r="3"/><circle cx="1168" cy="46" r="2"/><circle cx="1140" cy="52" r="2"/></g>
    <g fill="#f5a9c1" opacity="0.85">
      <g><animateTransform attributeName="transform" type="translate" values="0 0; -14 10; 0 0" dur="9s" repeatCount="indefinite"/>
        <path d="M760 34 q6 -7 12 0 q-6 4 -12 0Z"/><path d="M850 60 q6 -7 12 0 q-6 4 -12 0Z"/><path d="M690 74 q5 -6 10 0 q-5 3 -10 0Z"/></g>
    </g>
  </g>
</svg>
